name: Build And Publish Telegram Gateway Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/gateway/**'
      - 'deploy/azure-vm/**'
      - 'Dockerfile'
      - '.github/workflows/deploy-gateway.yml'

permissions:
  id-token: write
  contents: read

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PASSWORD }}

      - name: Compute gateway image
        id: image
        run: |
          OWNER_LOWER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER_LOWER}/telegram-gateway:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "namespace=${OWNER_LOWER}" >> "$GITHUB_OUTPUT"

      - name: Build and push gateway image
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          IMAGE_LATEST: ghcr.io/${{ steps.image.outputs.namespace }}/telegram-gateway:latest
        run: |
          docker build \
            --build-arg BUILD_MINIAPP=false \
            -f Dockerfile \
            -t "$IMAGE" \
            -t "$IMAGE_LATEST" .
          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"
